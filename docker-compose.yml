services:
  backend:
    build: ./backend
    env_file:
      - .env
    environment:
      - PORT=3001
    volumes:
      - gift-data:/app/data
    restart: unless-stopped
    networks:
      - agentready_internal

  frontend:
    build: ./frontend
    restart: unless-stopped
    networks:
      - agentready_internal

volumes:
  gift-data:

networks:
  agentready_internal:
    external: true
